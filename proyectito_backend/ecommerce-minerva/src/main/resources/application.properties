spring.profiles.include=secrets
spring.application.name=ecommerce-minerva
server.port=8080

# DATABASE CONFIGURATION
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#JWT CONFIGURATION
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.token-prefix=Bearer 
jwt.issuer=ecommerce-minerva


#CORS
cors.allowed-origins=http://localhost:4200,https://agent-6a31e715be28d6a37cd4f499--ripleysito.netlify.app

# LOGGING
logging.level.org.springframework.security=WARN
# Ver llamadas de Groq y recomendaciones en consola
logging.level.com.proyecto.service.RecomendacionServiceImplementation=INFO
# Ver requests HTTP hacia la API de Groq
logging.level.org.springframework.web.client=DEBUG
logging.level.org.springframework.ai=INFO

# JPA CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

#FILE SERVER
file.upload-dir=uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true

# OPENAI (SPRING AI) -> Configurado para usar GROQ
# IMPORTANTE: Spring AI añade /v1/chat/completions automáticamente al base-url
# Por eso NO debe incluir /v1 al final
spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant

# SHIPPO COURIER API CONFIGURATION
shippo.api.key=${SHIPPO_API_KEY}

# MERCADO PAGO CONFIGURATION
# Access Token de entorno de prueba (TEST) - usar las credenciales reales al produccion
mercadopago.access.token=${MERCADOPAGO_TOKEN}
# Webhook secret: dejar vacio hasta configurar ngrok en el panel de MP
mercadopago.webhook.secret=
# URL base del frontend para las back_urls del Brick
mercadopago.frontend.url=https://agent-6a31e715be28d6a37cd4f499--ripleysito.netlify.app

# ==========================================
# SOLUCIÓN: CONFIGURACIÓN DEL POOL HIKARI
# ==========================================

# 1. Tiempo máximo de vida de una conexión (10 minutos = 600000 ms). 
# Obliga a Hikari a renovar la conexión de forma segura antes de que SQL Server la corte.
spring.datasource.hikari.max-lifetime=600000

# ==========================================
# EMAIL SMTP CONFIGURATION (GMAIL)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=joseandi20041@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000
