spring.application.name=ecommerce-minerva
server.port=8080

# DATABASE CONFIGURATION
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ecommerce_minerva;encrypt=false
spring.datasource.username=apicito_user
spring.datasource.password=password123
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

#JWT CONFIGURATION
jwt.secret=TuClaveSecretaSuperSeguraDeAlMenos32Caracteres
jwt.expiration=86400000
jwt.token-prefix=Bearer 
jwt.issuer=ecommerce-minerva


#CORS
cors.allowed-origins=http://localhost:4200

# LOGGING
logging.level.org.springframework.security=DEBUG

# JPA CONFIGURATION
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

# HIKARI CONNECTION POOL
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

#FILE SERVER
file.upload-dir=uploads/
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.servlet.multipart.enabled=true