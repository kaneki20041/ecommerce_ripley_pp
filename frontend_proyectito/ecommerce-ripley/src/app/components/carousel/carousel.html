<div class="carousel-container" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">
  <div class="carousel-wrapper">
    <!-- Slides -->
    <div class="carousel-slides">
      @for (slide of slides; track slide.id; let i = $index) {
        <div
          class="carousel-slide"
          [class.active]="i === currentSlide"
          [style.background-image]="'url(' + slide.image + ')'"
        >
          <div class="slide-overlay"></div>
          <div class="slide-content">
            <span class="slide-eyebrow" [class.show]="i === currentSlide">Ripley · Colección 2025</span>
            <h2 class="slide-title" [class.show]="i === currentSlide">
              {{ slide.title }}
            </h2>
            <p class="slide-subtitle" [class.show]="i === currentSlide">
              {{ slide.subtitle }}
            </p>
            <a [routerLink]="slide.ctaLink" class="slide-cta" [class.show]="i === currentSlide">
              {{ slide.ctaText }}
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M5 12h14M12 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </a>
          </div>
        </div>
      }
    </div>

    <!-- Navigation Arrows -->
    <button class="carousel-nav prev" (click)="prevSlide()" aria-label="Anterior">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M15 18L9 12L15 6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <button class="carousel-nav next" (click)="nextSlide()" aria-label="Siguiente">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 18L15 12L9 6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Indicators -->
    <div class="carousel-indicators">
      @for (slide of slides; track slide.id; let i = $index) {
        <button
          class="indicator"
          [class.active]="i === currentSlide"
          (click)="goToSlide(i)"
          [attr.aria-label]="'Ir a diapositiva ' + (i + 1)"
        ></button>
      }
    </div>
  </div>
</div>
