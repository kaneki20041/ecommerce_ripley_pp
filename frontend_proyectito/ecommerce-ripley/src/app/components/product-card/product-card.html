<div class="product-card" (click)="viewProduct()">
    <!-- Badges -->
    <div class="badges">
        <span class="badge badge-new" *ngIf="product.nuevo">Nuevo</span>
        <span class="badge badge-discount" *ngIf="product.discountPercent > 0">
            -{{ product.discountPercent }}%
        </span>
    </div>

    <!-- Imagen del producto -->
    <div class="product-image">
        <img [src]="getMainImage()" [alt]="product.title" loading="lazy">

        <!-- Botón Ver Producto (hover) -->
        <div class="product-overlay">
            <button class="view-product-btn" (click)="viewProduct()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" stroke-width="2"/>
                    <circle cx="12" cy="12" r="3" stroke-width="2"/>
                </svg>
                Ver Producto
            </button>
        </div>
    </div>

    <!-- Información del producto -->
    <div class="product-info">
        <!-- Marca -->
        <p class="product-brand" *ngIf="product.marca">{{ product.marca }}</p>

        <!-- Nombre -->
        <h3 class="product-name">{{ product.title }}</h3>

        <!-- Precio -->
        <div class="product-price">
            <div class="price-container">
                <span class="current-price">S/ {{ product.price.toFixed(2) }}</span>
                <span class="old-price" *ngIf="product.discountedPrice && product.discountedPrice > product.price">
                    S/ {{ product.discountedPrice.toFixed(2) }}
                </span>
            </div>
            <div class="savings-badge" *ngIf="product.discountedPrice && product.discountedPrice > product.price">
                Ahorras S/ {{ (product.discountedPrice - product.price).toFixed(2) }}
            </div>
        </div>

        <!-- Colores disponibles -->
        <div class="product-colors" *ngIf="product.availableColors && product.availableColors.length > 0">
            <span *ngFor="let color of product.availableColors.slice(0, 4)" class="color-dot"
                [style.background-color]="getColorHex(color)"
                [title]="color">
            </span>
            <span *ngIf="product.availableColors && product.availableColors.length > 4" class="more-colors">
                +{{ product.availableColors.length - 4 }}
            </span>
        </div>
    </div>
</div>
