<div class="dashboard-layout">
    <app-dashboard-sidebar></app-dashboard-sidebar>

    <main class="dashboard-content">
        <!-- Page Header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Dashboard Empleado</h1>
                <p class="page-subtitle">Panel de control operativo</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" (click)="refreshData()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="23 4 23 10 17 10" stroke-width="2" />
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" stroke-width="2" />
                    </svg>
                    Actualizar
                </button>
                <button class="btn btn-primary" routerLink="/employee/productos">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <line x1="12" y1="5" x2="12" y2="19" stroke-width="2" />
                        <line x1="5" y1="12" x2="19" y2="12" stroke-width="2" />
                    </svg>
                    Nuevo Producto
                </button>
            </div>
        </div>

        <!-- Stats Grid (3 cards) -->
        <div class="stats-grid">
            <app-stats-card *ngFor="let stat of stats" [title]="stat.title" [value]="stat.value" [icon]="stat.icon"
                [color]="stat.color" [trend]="stat.trend" [loading]="loading()">
            </app-stats-card>
        </div>

        <!-- Content Grid -->
        <div class="content-grid">
            <!-- Pending Orders -->
            <div class="card">
                <div class="card-header">
                    <h3>Pedidos Pendientes de Hoy</h3>
                    <a routerLink="/employee/pedidos" class="view-all">Ver todos →</a>
                </div>
                <app-data-table [columns]="pendingOrdersColumns" [data]="pendingOrdersData" [actions]="ordersActions"
                    [pagination]="false" [loading]="loading()" emptyMessage="No hay pedidos pendientes">
                </app-data-table>
            </div>

            <!-- Low Stock Products -->
            <div class="card">
                <div class="card-header">
                    <h3>Productos con Stock Bajo</h3>
                    <a routerLink="/employee/productos" class="view-all">Ver inventario →</a>
                </div>
                <div class="stock-list">
                    <div *ngFor="let product of lowStockProducts" class="stock-item">
                        <div class="stock-info">
                            <p class="stock-name">{{ product.name }}</p>
                            <p class="stock-category">{{ product.category }}</p>
                        </div>
                        <div class="stock-alert">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <path
                                    d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
                                    stroke-width="2" />
                                <line x1="12" y1="9" x2="12" y2="13" stroke-width="2" />
                                <line x1="12" y1="17" x2="12.01" y2="17" stroke-width="2" />
                            </svg>
                            <span>{{ product.stock }} unidades</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Quick Actions -->
        <div class="quick-actions">
            <h3>Acciones Rápidas</h3>
            <div class="actions-grid">
                <button class="action-card" routerLink="/employee/productos">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path
                            d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                            stroke-width="2" />
                        <polyline points="3.27 6.96 12 12.01 20.73 6.96" stroke-width="2" />
                        <line x1="12" y1="22.08" x2="12" y2="12" stroke-width="2" />
                    </svg>
                    <span>Gestionar Productos</span>
                </button>

                <button class="action-card" routerLink="/employee/pedidos">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke-width="2" />
                        <line x1="3" y1="6" x2="21" y2="6" stroke-width="2" />
                        <path d="M16 10a4 4 0 0 1-8 0" stroke-width="2" />
                    </svg>
                    <span>Ver Pedidos</span>
                </button>

                <button class="action-card" routerLink="/employee/devoluciones">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="9 14 4 9 9 4" stroke-width="2" />
                        <path d="M20 20v-7a4 4 0 0 0-4-4H4" stroke-width="2" />
                    </svg>
                    <span>Devoluciones</span>
                </button>

                <button class="action-card" routerLink="/employee/perfil">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2" />
                        <circle cx="12" cy="7" r="4" stroke-width="2" />
                    </svg>
                    <span>Mi Perfil</span>
                </button>
            </div>
        </div>
    </main>
</div>
