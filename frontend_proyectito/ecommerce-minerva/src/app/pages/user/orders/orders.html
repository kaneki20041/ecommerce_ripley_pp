<div class="dashboard-layout">
    <app-dashboard-sidebar></app-dashboard-sidebar>
    <main class="dashboard-content">
        <h1>Mis Pedidos</h1><br>

        <div class="orders-grid">
            <div *ngFor="let order of orders" class="order-card">
                <div class="order-header">
                    <span class="order-id">{{ order.id }}</span>
                    <span class="order-status" [attr.data-status]="order.status">
                        {{ order.status }}
                    </span>
                </div>
                <div class="order-products">
                    <img *ngFor="let img of order.products" [src]="img">
                </div>
                <div class="order-footer">
                    <div>{{ order.date }} • {{ order.items }} productos</div>
                    <div class="order-total">S/ {{ order.total }}</div>
                </div>
                <a [routerLink]="['/cuenta/pedido', order.id]" class="view-link">
                    Ver Detalle
                </a>
            </div>
        </div>
    </main>
</div>
