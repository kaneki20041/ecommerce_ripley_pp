<div class="dashboard-layout">
    <app-dashboard-sidebar></app-dashboard-sidebar>
    <main class="dashboard-content">
        <div class="profile-header">
            <div class="profile-avatar-large">{{ userInitials() }}</div>
            <div>
                <h1>{{ currentUser()?.firstName }} {{ currentUser()?.lastName }}</h1>
                <p>{{ currentUser()?.email }}</p>
            </div>
        </div>

        <div class="profile-tabs">
            <button [class.active]="activeTab === 'info'" (click)="activeTab = 'info'">
                Información Personal
            </button>
            <button [class.active]="activeTab === 'security'" (click)="activeTab = 'security'">
                Seguridad
            </button>
        </div>

        <div class="profile-content" *ngIf="activeTab === 'info'">
            <form class="profile-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" [(ngModel)]="profileForm.firstName" name="firstName" readonly>
                    </div>
                    <div class="form-group">
                        <label>Apellido</label>
                        <input type="text" [(ngModel)]="profileForm.lastName" name="lastName" readonly>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" [(ngModel)]="profileForm.email" name="email" readonly>
                    </div>
                    <div class="form-group">
                        <label>Celular</label>
                        <input type="text" [(ngModel)]="profileForm.celular" name="celular" readonly>
                    </div>
                </div>
            </form>
        </div>

        <div class="profile-content" *ngIf="activeTab === 'security'">
            <div class="security-section">
                <h3 class="section-title">Información General</h3>
                <form class="profile-form" (submit)="saveGeneralInfo(); $event.preventDefault()">
                    <div class="form-group">
                        <label>Foto de Perfil (URL)</label>
                        <input type="text" [(ngModel)]="profileForm.foto" name="foto" placeholder="URL de tu foto">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Fecha de Nacimiento</label>
                            <input type="date" [(ngModel)]="profileForm.fechaNacimiento" name="fechaNacimiento">
                        </div>
                        <div class="form-group">
                            <label>Dirección</label>
                            <input type="text" [(ngModel)]="profileForm.direccion" name="direccion" placeholder="Ej: Av. Principal 123">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </form>
            </div>

            <hr class="section-divider">

            <div class="security-section">
                <h3 class="section-title">Cambiar Contraseña</h3>
                <form class="profile-form" (submit)="changePassword(); $event.preventDefault()">
                    <div class="form-group">
                        <label>Contraseña Actual</label>
                        <input type="password" [(ngModel)]="passwordForm.currentPassword" name="currentPassword" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nueva Contraseña</label>
                            <input type="password" [(ngModel)]="passwordForm.newPassword" name="newPassword" required>
                        </div>
                        <div class="form-group">
                            <label>Repetir Contraseña</label>
                            <input type="password" [(ngModel)]="passwordForm.confirmPassword" name="confirmPassword" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Actualizar Contraseña</button>
                </form>
            </div>
        </div>
    </main>
</div>
