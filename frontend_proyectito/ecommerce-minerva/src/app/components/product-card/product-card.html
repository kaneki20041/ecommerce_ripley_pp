<div class="product-card" (click)="viewProduct()">
    <!-- Badges -->
    <div class="badges">
        <span class="badge badge-new" *ngIf="product.nuevo">Nuevo</span>
        <span class="badge badge-discount" *ngIf="product.descuentot > 0">
            -{{ product.descuentot }}%
        </span>
    </div>

    <!-- Imagen del producto -->
    <div class="product-image">
        <img [src]="getMainImage()" [alt]="product.title" loading="lazy">

        <!-- Botón de agregar rápido -->
        <button *ngIf="showQuickAdd" class="quick-add-btn" (click)="quickAddToCart($event)"
            [class.in-cart]="isInCart()">
            <svg *ngIf="!isInCart()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path
                    d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"
                    stroke-width="2" />
                <line x1="12" y1="9" x2="12" y2="15" stroke-width="2" />
                <line x1="9" y1="12" x2="15" y2="12" stroke-width="2" />
            </svg>
            <svg *ngIf="isInCart()" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M20 6L9 17l-5-5" stroke-width="2" stroke-linecap="round" />
            </svg>
            <span>{{ isInCart() ? 'En carrito' : 'Agregar' }}</span>
        </button>
    </div>

    <!-- Información del producto -->
    <div class="product-info">
        <!-- Marca -->
        <p class="product-brand" *ngIf="product.marca">{{ product.marca }}</p>

        <!-- Nombre -->
        <h3 class="product-name">{{ product.title }}</h3>

        <!-- Precio -->
        <div class="product-price">
            <div class="price-container">
                <span class="current-price">S/ {{ product.price.toFixed(2) }}</span>
                <span class="old-price" *ngIf="product.descuentoprice">
                    S/ {{ product.descuentoprice.toFixed(2) }}
                </span>
            </div>
        </div>

        <!-- Colores disponibles -->
        <div class="product-colors" *ngIf="product.availableColors && product.availableColors.length > 1">
            <span *ngFor="let color of product.availableColors.slice(0, 4)" class="color-dot"
                [style.background-color]="getColorHex(color)"
                [title]="color">
            </span>
            <span *ngIf="product.availableColors && product.availableColors.length > 4" class="more-colors">
                +{{ product.availableColors.length - 4 }}
            </span>
        </div>
    </div>
</div>
