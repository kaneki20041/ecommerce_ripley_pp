<div class="stats-card" [style.--card-color]="color">
    <!-- Loading State -->
    <div class="stats-loading" *ngIf="loading">
        <div class="skeleton-icon"></div>
        <div class="skeleton-content">
            <div class="skeleton-line"></div>
            <div class="skeleton-line short"></div>
        </div>
    </div>

    <!-- Content -->
    <div class="stats-content" *ngIf="!loading">
        <!-- Icon -->
        <div class="stats-icon">
            <!-- Dollar -->
            <svg *ngIf="icon === 'dollar'" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <line x1="12" y1="1" x2="12" y2="23" stroke-width="2" />
                <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" stroke-width="2" />
            </svg>

            <!-- Users -->
            <svg *ngIf="icon === 'users'" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2" />
                <circle cx="9" cy="7" r="4" stroke-width="2" />
                <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-width="2" />
            </svg>

            <!-- Box -->
            <svg *ngIf="icon === 'box'" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path
                    d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                    stroke-width="2" />
            </svg>

            <!-- Shopping Bag -->
            <svg *ngIf="icon === 'shopping-bag'" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke-width="2" />
                <line x1="3" y1="6" x2="21" y2="6" stroke-width="2" />
                <path d="M16 10a4 4 0 0 1-8 0" stroke-width="2" />
            </svg>

            <!-- Trending Up -->
            <svg *ngIf="icon === 'trending-up'" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" stroke-width="2" />
                <polyline points="17 6 23 6 23 12" stroke-width="2" />
            </svg>

            <!-- Return -->
            <svg *ngIf="icon === 'return'" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <polyline points="9 14 4 9 9 4" stroke-width="2" />
                <path d="M20 20v-7a4 4 0 0 0-4-4H4" stroke-width="2" />
            </svg>

            <!-- Default -->
            <svg *ngIf="icon === 'default'" width="32" height="32" viewBox="0 0 24 24" fill="none"
                stroke="currentColor">
                <circle cx="12" cy="12" r="10" stroke-width="2" />
                <line x1="12" y1="16" x2="12" y2="12" stroke-width="2" />
                <line x1="12" y1="8" x2="12.01" y2="8" stroke-width="2" />
            </svg>
        </div>

        <!-- Info -->
        <div class="stats-info">
            <p class="stats-title">{{ title }}</p>
            <h2 class="stats-value">{{ value }}</h2>

            <!-- Trend -->
            <div class="stats-trend" *ngIf="trend">
                <svg *ngIf="trend.isUp" class="trend-icon up" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor">
                    <polyline points="18 15 12 9 6 15" stroke-width="2" />
                </svg>
                <svg *ngIf="!trend.isUp" class="trend-icon down" width="16" height="16" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor">
                    <polyline points="6 9 12 15 18 9" stroke-width="2" />
                </svg>
                <span [class.up]="trend.isUp" [class.down]="!trend.isUp">
                    {{ trend.value }}%
                </span>
            </div>
        </div>
    </div>
</div>
