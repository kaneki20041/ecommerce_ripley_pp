<aside class="dashboard-sidebar" [class.collapsed]="collapsed">
    <!-- Logo y Toggle -->
    <div class="sidebar-header">
        <div class="logo" *ngIf="!collapsed">
            <img src="assets/logo.png" alt="Logo" class="logo-img">
            <span class="logo-text">Tienda Textil</span>
        </div>
        <button class="toggle-btn" (click)="toggleSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <line x1="3" y1="12" x2="21" y2="12" stroke-width="2" />
                <line x1="3" y1="6" x2="21" y2="6" stroke-width="2" />
                <line x1="3" y1="18" x2="21" y2="18" stroke-width="2" />
            </svg>
        </button>
    </div>

    <!-- User Info -->
    <div class="user-info" *ngIf="!collapsed">
        <div class="user-avatar">
            <span>{{ currentUser()?.firstName?.charAt(0) }}{{ currentUser()?.lastName?.charAt(0) }}</span>
        </div>
        <div class="user-details">
            <p class="user-name">{{ currentUser()?.firstName }} {{ currentUser()?.lastName }}</p>
            <span class="user-role" [style.background-color]="getRoleColor()">
                {{ getRoleLabel() }}
            </span>
        </div>
    </div>

    <!-- Navigation Menu -->
    <nav class="sidebar-nav">
        <ul class="nav-list">
            <li *ngFor="let item of menuItems()" class="nav-item">
                <a [routerLink]="item.route" routerLinkActive="active" class="nav-link"
                    [title]="collapsed ? item.label : ''">

                    <!-- Icon -->
                    <span class="nav-icon">
                        <!-- Dashboard -->
                        <svg *ngIf="item.icon === 'dashboard'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <rect x="3" y="3" width="7" height="7" stroke-width="2" />
                            <rect x="14" y="3" width="7" height="7" stroke-width="2" />
                            <rect x="14" y="14" width="7" height="7" stroke-width="2" />
                            <rect x="3" y="14" width="7" height="7" stroke-width="2" />
                        </svg>

                        <!-- Users -->
                        <svg *ngIf="item.icon === 'users'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke-width="2" />
                            <circle cx="9" cy="7" r="4" stroke-width="2" />
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke-width="2" />
                        </svg>

                        <!-- Ticket -->
                        <svg *ngIf="item.icon === 'ticket'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" stroke-width="2" />
                        </svg>

                        <!-- Return -->
                        <svg *ngIf="item.icon === 'return'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" stroke-width="2" />
                            <polyline points="9 22 9 12 15 12 15 22" stroke-width="2" />
                        </svg>

                        <!-- Chart -->
                        <svg *ngIf="item.icon === 'chart'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <line x1="12" y1="20" x2="12" y2="10" stroke-width="2" />
                            <line x1="18" y1="20" x2="18" y2="4" stroke-width="2" />
                            <line x1="6" y1="20" x2="6" y2="16" stroke-width="2" />
                        </svg>

                        <!-- Settings -->
                        <svg *ngIf="item.icon === 'settings'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <circle cx="12" cy="12" r="3" stroke-width="2" />
                            <path
                                d="M12 1v6m0 6v6M5.6 5.6l4.2 4.2m4.2 4.2l4.2 4.2M1 12h6m6 0h6M5.6 18.4l4.2-4.2m4.2-4.2l4.2-4.2"
                                stroke-width="2" />
                        </svg>

                        <!-- Box -->
                        <svg *ngIf="item.icon === 'box'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <path
                                d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"
                                stroke-width="2" />
                            <polyline points="3.27 6.96 12 12.01 20.73 6.96" stroke-width="2" />
                            <line x1="12" y1="22.08" x2="12" y2="12" stroke-width="2" />
                        </svg>

                        <!-- Shopping Bag -->
                        <svg *ngIf="item.icon === 'shopping-bag'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" stroke-width="2" />
                            <line x1="3" y1="6" x2="21" y2="6" stroke-width="2" />
                            <path d="M16 10a4 4 0 0 1-8 0" stroke-width="2" />
                        </svg>

                        <!-- User -->
                        <svg *ngIf="item.icon === 'user'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke-width="2" />
                            <circle cx="12" cy="7" r="4" stroke-width="2" />
                        </svg>

                        <!-- Heart -->
                        <svg *ngIf="item.icon === 'heart'" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor">
                            <path
                                d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"
                                stroke-width="2" />
                        </svg>
                    </span>

                    <!-- Label -->
                    <span class="nav-label" *ngIf="!collapsed">{{ item.label }}</span>

                    <!-- Badge -->
                    <span class="nav-badge" *ngIf="item.badge && !collapsed">{{ item.badge }}</span>
                </a>
            </li>
        </ul>
    </nav>

    <!-- Logout Button -->
    <div class="sidebar-footer">
        <button class="logout-btn" (click)="logout()" [title]="collapsed ? 'Cerrar Sesión' : ''">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke-width="2" />
                <polyline points="16 17 21 12 16 7" stroke-width="2" />
                <line x1="21" y1="12" x2="9" y2="12" stroke-width="2" />
            </svg>
            <span *ngIf="!collapsed">Cerrar Sesión</span>
        </button>
    </div>
</aside>
